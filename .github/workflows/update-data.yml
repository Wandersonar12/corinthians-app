name: Atualizar Dados Corinthians

on:
  schedule:
    - cron: '0 8,12,18,22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install node-fetch xml2js

      - name: Buscar e atualizar dados
        run: node scripts/update-data.js
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Commit e push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/data.js
          git diff --staged --quiet || git commit -m "Dados atualizados"
          git push
